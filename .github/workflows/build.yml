name: Build and Push ZeroClue Docker Images (CUDA 12.8 + 13.0)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: false
        default: 'main'
      targets:
        description: 'Build targets (comma-separated): base,slim,minimal'
        required: false
        default: 'base'
      cuda_versions:
        description: 'CUDA versions (comma-separated): 12-8,13-0'
        required: false
        default: '13-0'
  schedule:
    - cron: "0 */8 * * *"
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker-bake.hcl'
      - 'scripts/**'
      - 'custom_nodes.txt'
      - 'proxy/**'
      - 'config/**'
      - '.github/workflows/build.yml'

jobs:
  bake:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          # Primary: CUDA 13.0 + PyTorch 2.11.0 (default, :latest tag)
          - target: base
            cuda: 13-0
          # Fallback: CUDA 12.8 + PyTorch 2.11.0 (known-good)
          - target: base
            cuda: 12-8
    steps:
      - name: Check if should run
        run: |
          TARGETS="${{ github.event.inputs.targets || 'base' }}"
          CUDA="${{ github.event.inputs.cuda_versions || '13-0' }}"

          if [[ ",$TARGETS," != *",${{ matrix.target }},"* ]]; then
            echo "SKIP_BUILD=true" >> $GITHUB_ENV
            echo "Skipping ${{ matrix.target }}-${{ matrix.cuda }} (not in targets list)"
          elif [[ ",$CUDA," != *",${{ matrix.cuda }},"* ]]; then
            echo "SKIP_BUILD=true" >> $GITHUB_ENV
            echo "Skipping ${{ matrix.target }}-${{ matrix.cuda }} (not in CUDA list)"
          else
            echo "Building ${{ matrix.target }}-${{ matrix.cuda }}"
          fi

      - name: Aggressive disk cleanup
        if: env.SKIP_BUILD != 'true'
        run: |
          echo "=== Disk usage before cleanup ==="
          df -h
          echo ""

          # Remove Java (JDKs)
          sudo rm -rf /usr/lib/jvm

          # Remove .NET SDKs
          sudo rm -rf /usr/share/dotnet

          # Remove Swift toolchain
          sudo rm -rf /usr/share/swift

          # Remove Haskell (GHC)
          sudo rm -rf /usr/local/.ghcup

          # Remove Julia
          sudo rm -rf /usr/local/julia*

          # Remove Android SDKs
          sudo rm -rf /usr/local/lib/android

          # Remove Chromium
          sudo rm -rf /usr/local/share/chromium

          # Remove Microsoft/Edge and Google Chrome
          sudo rm -rf /opt/microsoft /opt/google

          # Remove Azure CLI
          sudo rm -rf /opt/az

          # Remove PowerShell
          sudo rm -rf /usr/local/share/powershell

          # Remove CodeQL and other toolcaches
          sudo rm -rf /opt/hostedtoolcache

          # Docker cleanup
          docker system prune -af || true
          docker builder prune -af || true

          echo ""
          echo "=== Disk usage after cleanup ==="
          df -h

      - name: Checkout
        if: env.SKIP_BUILD != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-tags: true

      - name: Docker login
        if: env.SKIP_BUILD != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        if: env.SKIP_BUILD != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Get current date
        if: env.SKIP_BUILD != 'true'
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Resolve version tag
        if: env.SKIP_BUILD != 'true'
        id: version
        run: |
          GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$GIT_TAG" ]; then
            echo "extra_tag=-${GIT_TAG}" >> $GITHUB_OUTPUT
            echo "version=${GIT_TAG}" >> $GITHUB_OUTPUT
            echo "Version tag: ${GIT_TAG}"
          else
            echo "extra_tag=" >> $GITHUB_OUTPUT
            echo "version=dev" >> $GITHUB_OUTPUT
            echo "No git tag found, building without version pin"
          fi

      - name: Build and push
        if: env.SKIP_BUILD != 'true'
        uses: docker/bake-action@v6
        with:
          targets: ${{ matrix.target }}-${{ matrix.cuda }}
          push: true
        env:
          EXTRA_TAG: ${{ steps.version.outputs.extra_tag }}

      - name: Free disk space
        if: env.SKIP_BUILD != 'true'
        run: |
          echo "Freeing disk space..."
          docker system prune -af --volumes 2>/dev/null || true
          df -h

      - name: Build summary
        if: env.SKIP_BUILD != 'true'
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          echo "- **CUDA Version**: ${{ matrix.cuda }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: zeroclue/comfyui" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Date**: ${{ steps.date.outputs.date }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Mode**: Base variant only (stability focus)" >> $GITHUB_STEP_SUMMARY
          echo "- **Preset Manager**: Included (all variants)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Component Status" >> $GITHUB_STEP_SUMMARY
          echo "- Preset Manager: ✅ Verified" >> $GITHUB_STEP_SUMMARY
          echo "- Download Scripts: ✅ Verified" >> $GITHUB_STEP_SUMMARY
          echo "- Python Imports: ✅ Verified" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image Variants" >> $GITHUB_STEP_SUMMARY
          echo "- **base**: Full development environment (~8-12GB)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Focus" >> $GITHUB_STEP_SUMMARY
          echo "Simplified to base variant only until stable." >> $GITHUB_STEP_SUMMARY